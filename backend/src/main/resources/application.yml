server:
  port: ${SERVER_PORT:8080}

spring:
  config:
    import: optional:classpath:application-local.yml
  application:
    name: youhuifuwu-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/youhuifuwu?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:change-me}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id

jwt:
  issuer: ${JWT_ISSUER:youhuifuwu}
  secret: ${JWT_SECRET:change-me-to-a-long-random-string}
  expire-hours: ${JWT_EXPIRE_HOURS:24}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
